<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <clipPath id="waveform-clip">
      <rect x="960" y="440" width="160" height="80"/>
    </clipPath>
  </defs>

  <!-- ===== coral signature card (상단) ===== -->
  <rect width="1200" height="140" fill="#aa2d00"/>

  <!-- Fork + Knife icons (좌측) -->
  <g transform="translate(96, 36)" opacity="0.9">
    <!-- Fork -->
    <rect x="0" y="28" width="8" height="72" rx="4" fill="#ffffff"/>
    <rect x="-16" y="0" width="7" height="48" rx="3.5" fill="#ffffff"/>
    <rect x="-2" y="0" width="7" height="48" rx="3.5" fill="#ffffff"/>
    <rect x="12" y="0" width="7" height="48" rx="3.5" fill="#ffffff"/>
    <!-- Knife -->
    <rect x="36" y="40" width="7" height="60" rx="3.5" fill="#ffffff" opacity="0.7"/>
    <path d="M48,0 L68,0 Q74,0 74,5 L74,40 L48,40 Z" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- FestRecipe brand -->
  <text x="180" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#ffffff">
    FestRecipe
  </text>

  <!-- Subtitle on coral -->
  <text x="180" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff" opacity="0.7">
    AI가 말아주는 페스티벌 셋리스트
  </text>

  <!-- URL (우측) -->
  <text x="1104" y="72" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#ffffff" opacity="0.8">
    festrecipe.com
  </text>

  <!-- Divider -->
  <line x1="96" y1="116" x2="1104" y2="116" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- ===== canvas (하단) ===== -->
  <rect y="140" width="1200" height="490" fill="#ffffff"/>

  <!-- Main line 1: AI가 말아주는 -->
  <text x="144" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="500" fill="#181d26">
    AI가 말아주는
  </text>

  <!-- Main line 2: 예상 페스티벌 셋리스트 (larger) -->
  <text x="144" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="500" fill="#181d26">
    예상 페스티벌 셋리스트
  </text>

  <!-- Sub line 1 -->
  <text x="144" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#333840">
    페스티벌 전날 밤,
  </text>

  <!-- Sub line 2 -->
  <text x="144" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#333840">
    예상곡 먼저 듣기
  </text>

  <!-- CTA button (coral filled pill) -->
  <rect x="144" y="460" width="220" height="48" rx="9999" fill="#aa2d00"/>

  <!-- Play icon inside CTA -->
  <g transform="translate(162, 472)">
    <polygon points="0,0 20,12 0,24" fill="#ffffff"/>
  </g>

  <!-- CTA text -->
  <text x="198" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#ffffff">
    예상 셋리스트 듣기
  </text>

  <!-- Waveform (우하단, 얇은 line, low alpha) -->
  <g clip-path="url(#waveform-clip)" opacity="0.08">
    <path d="M960,480 L968,468 L976,490 L984,460 L992,495 L1000,470 L1008,485 L1016,458 L1024,492 L1032,465 L1040,488 L1048,462 L1056,490 L1064,470 L1072,485 L1080,460 L1088,492 L1096,468 L1104,488 L1112,462 L1120,480"
          fill="none" stroke="#181d26" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
